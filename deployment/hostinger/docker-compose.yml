services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - ltu-frontend
      - mkd-frontend

  ltu-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: football
      POSTGRES_USER: football_user
      POSTGRES_PASSWORD: ${LTU_POSTGRES_PASSWORD:?Set LTU_POSTGRES_PASSWORD in deployment/hostinger/.env}
    volumes:
      - ltu-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football_user -d football"]
      interval: 5s
      timeout: 5s
      retries: 10

  ltu-backend:
    build:
      context: ../../backend-spring
    restart: unless-stopped
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://ltu-postgres:5432/football
      SPRING_DATASOURCE_USERNAME: football_user
      SPRING_DATASOURCE_PASSWORD: ${LTU_POSTGRES_PASSWORD:?Set LTU_POSTGRES_PASSWORD in deployment/hostinger/.env}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      TZ: Europe/Vilnius
      APP_URL: https://lt.kietekai.com
      MATCH_REMINDER_LANGUAGE: lt
      SPRING_MAIL_HOST: ${HOSTINGER_MAIL_HOST:-smtp.hostinger.com}
      SPRING_MAIL_PORT: ${HOSTINGER_MAIL_PORT:-465}
      SPRING_MAIL_USERNAME: ${EMAIL_USERNAME:?Set EMAIL_USERNAME in deployment/hostinger/.env}
      SPRING_MAIL_PASSWORD: ${EMAIL_PASSWORD:?Set EMAIL_PASSWORD in deployment/hostinger/.env}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE: "true"
    depends_on:
      ltu-postgres:
        condition: service_healthy

  ltu-frontend:
    build:
      context: ../../frontend-vue
    restart: unless-stopped
    environment:
      BACKEND_UPSTREAM: ltu-backend:8080
    depends_on:
      - ltu-backend

  mkd-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: football
      POSTGRES_USER: football_user
      POSTGRES_PASSWORD: ${MKD_POSTGRES_PASSWORD:?Set MKD_POSTGRES_PASSWORD in deployment/hostinger/.env}
    volumes:
      - mkd-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football_user -d football"]
      interval: 5s
      timeout: 5s
      retries: 10

  mkd-backend:
    build:
      context: ../../backend-spring
    restart: unless-stopped
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://mkd-postgres:5432/football
      SPRING_DATASOURCE_USERNAME: football_user
      SPRING_DATASOURCE_PASSWORD: ${MKD_POSTGRES_PASSWORD:?Set MKD_POSTGRES_PASSWORD in deployment/hostinger/.env}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      TZ: Europe/Skopje
      APP_URL: https://mk.kietekai.com
      MATCH_REMINDER_LANGUAGE: en
      SPRING_MAIL_HOST: ${HOSTINGER_MAIL_HOST:-smtp.hostinger.com}
      SPRING_MAIL_PORT: ${HOSTINGER_MAIL_PORT:-465}
      SPRING_MAIL_USERNAME: ${EMAIL_USERNAME:?Set EMAIL_USERNAME in deployment/hostinger/.env}
      SPRING_MAIL_PASSWORD: ${EMAIL_PASSWORD:?Set EMAIL_PASSWORD in deployment/hostinger/.env}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE: "true"
    depends_on:
      mkd-postgres:
        condition: service_healthy

  mkd-frontend:
    build:
      context: ../../frontend-vue
    restart: unless-stopped
    environment:
      BACKEND_UPSTREAM: mkd-backend:8080
    depends_on:
      - mkd-backend

volumes:
  caddy-data:
  caddy-config:
  ltu-postgres-data:
  mkd-postgres-data:
