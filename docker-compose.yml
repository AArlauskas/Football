services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: football
      POSTGRES_USER: football_user
      POSTGRES_PASSWORD: football_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football_user -d football"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend-spring
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/football
      SPRING_DATASOURCE_USERNAME: football_user
      SPRING_DATASOURCE_PASSWORD: football_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_MAIL_HOST: localhost
      SPRING_MAIL_PORT: 1025
      TZ: Europe/Vilnius
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend-vue:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
  frontend-node-modules:
